  if (rec.weight) ctx += `Weight: ${rec.weight}kg\n`;

  // Soreness
  const soreness = await store.get(`soreness:${date}`) || {};
  const soreItems = Object.entries(soreness).filter(([,v]) => v !== 'fine');
  if (soreItems.length) ctx += `Soreness: ${soreItems.map(([m,s]) => `${m} (${s.replace('-',' ')})`).join(', ')}\n`;

  // Yesterday's nutrition
  const yestNut = await store.get(`nutrition:${daysAgo(1)}`);
  if (yestNut) ctx += `Yesterday nutrition: ${yestNut.cals ? yestNut.cals + 'kcal' : '--'}, ${yestNut.prot ? yestNut.prot + 'g protein' : '--'}\n`;

  // Energy
  if (energy) ctx += `Morning energy: ${['😴','😐','😊','💪','🔥'][energy-1] || ''} (${energy}/5)\n`;

  // Recent session summaries (duration, HR, calories, RPE) from watch logging
  const sessKeys = store.list('session:').sort().reverse().slice(0, 3);
  if (sessKeys.length) {
    ctx += `\nRecent session summaries:\n`;
    for (const k of sessKeys) {
      const s = store.get(k); const d = k.slice(8);
      const parts = [];
      if (s.duration) parts.push(`${s.duration}min`);
      if (s.avgHr) parts.push(`avg HR ${s.avgHr}`);
      if (s.maxHr) parts.push(`max HR ${s.maxHr}`);
      if (s.calories) parts.push(`${s.calories}kcal`);
      if (s.rpe) parts.push(`RPE ${s.rpe}`);
      if (s.adherence) parts.push(s.adherence + (s.deviationReasons && s.deviationReasons.length ? ` (${s.deviationReasons.join('/')})` : ''));
      if (parts.length) ctx += `  ${d}: ${parts.join(', ')}\n`;
    }
  }

  // Last session for today's day
  if (!plan.cardio) {
    const lastSession = await getLastSession(dayKey);
    if (lastSession) {
      ctx += `\nLast ${plan.name} session performance:\n`;
      plan.exercises.slice(0, 4).forEach((ex, ei) => {
        let best = '';
        for (let s = 1; s <= ex.sets; s++) {
          const sd = lastSession[`${ei}-${s}`] || {};
          if (sd.w && sd.r) best = `${sd.w}kg × ${sd.r}`;
        }
        if (best) ctx += `  ${ex.name}: ${best}\n`;
      });
    }
  }
  return ctx;
}

async function buildWeeklyContext() {
  const start = daysAgo(6), end = today();
  let ctx = `Weekly Summary Request\n\nThis report covers the last 7 calendar days only: ${start} to ${end} (inclusive). Do NOT comment on days outside this window. If older data exists, it is intentionally excluded here.\n`;
  const sleepLog = await store.get('sleep:log') || {};
  const recHist = await store.get('recovery:history') || [];
  const prs = await store.get('prs') || {};

  // Sleep last 7 nights
  ctx += '\nSLEEP:\n';
  for (let i = 6; i >= 0; i--) {
    const d = daysAgo(i);
    const s = sleepLog[d];
    const dn = new Date(d + 'T12:00:00').toLocaleDateString('en', { weekday: 'short' });
    ctx += `  ${dn} ${d}: ${s ? `${s.h}h${s.m ? s.m + 'm' : ''}` : 'not logged'}\n`;
  }

  // Recovery entries within the window only
  const inWindow = recHist.filter(e => e.date >= start && e.date <= end);
  if (inWindow.length) {
    ctx += '\nRECOVERY (this window):\n';
    inWindow.forEach(e => { ctx += `  ${e.date}: HRV ${e.hrv || '--'}ms, RHR ${e.rhr || '--'}bpm, Weight ${e.weight || '--'}kg, BF ${e.bf || '--'}%\n`; });
  }

  // Workouts done, with session summary + adherence when present
  ctx += '\nWORKOUTS:\n';
  let doneCount = 0;
  for (let i = 6; i >= 0; i--) {
    const d = daysAgo(i);
    const dow = new Date(d + 'T12:00:00').getDay();
    const dayIdx = dow === 0 ? 6 : dow - 1;
    const dk = DAY_KEYS[dayIdx];
    const dn = DAY_LABELS[dayIdx];
    const session = await store.get(`workout:${dk}:${d}`);
    const cardio  = await store.get(`cardio:${dk}:${d}`);
    const sess = await store.get(`session:${d}`);
    const done = !!(session || cardio);
    if (done) doneCount++;
    let extra = '';
    if (sess) {
      const p = [];
      if (sess.duration) p.push(`${sess.duration}min`);
      if (sess.avgHr) p.push(`HR ${sess.avgHr}`);
      if (sess.rpe) p.push(`RPE ${sess.rpe}`);
      if (sess.adherence) p.push(sess.adherence + (sess.deviationReasons && sess.deviationReasons.length ? `: ${sess.deviationReasons.join('/')}` : ''));
      if (p.length) extra = ` [${p.join(', ')}]`;
    }
    ctx += `  ${d} ${dn}: ${planForDate(d)[dk].name} - ${done ? 'DONE' : 'missed'}${extra}\n`;
  }
  ctx += `\nSessions completed this window: ${doneCount} of 7.\n`;

  // PRs (reference only, not window-bound)
  const prList = Object.entries(prs);
  if (prList.length) {
    ctx += '\nCURRENT PERSONAL RECORDS:\n';
    prList.slice(0, 8).forEach(([id, pr]) => {
      const ex = Object.values(PLAN).flatMap(d => d.exercises || []).find(e => e.id === id);
      ctx += `  ${ex ? ex.name : id}: ${pr.weight}kg × ${pr.reps} (${pr.date})\n`;
    });
  }

  return ctx;
}

// COACH PROPOSAL ENGINE (rule-based, zero API cost)
// ============================================================
// Reads logged data + active plan, returns concrete proposals. Each proposal can
// build a candidate plan that routes through the SAME stagePlan() confirm flow
// as a chat import, so every change is dated and confirmed. No silent edits.

function parseRange(reps) { const m = String(reps).match(/(\d+)\s*-\s*(\d+)/); return m ? [+m[1], +m[2]] : (parseInt(reps) ? [parseInt(reps), parseInt(reps)] : [null, null]); }

// Deep clone the active plan so we can build candidate variants safely.
function cloneActivePlan() {
  const active = planForDate(today());
  return JSON.parse(JSON.stringify(active));
}

// Analyse last sessions of an exercise for a stall (top of range hit with room, no load increase).
function analyseExerciseProgress(dayKey, ex, exIdx) {
  const keys = store.list(`workout:${dayKey}:`).sort().reverse().slice(0, 4);
  const sessions = keys.map(k => store.get(k)).filter(Boolean);
  if (sessions.length < 3) return null;
  const [, top] = parseRange(ex.reps);
  // Top-set weight per session (max weight used on any set of this exercise)
  const topWeights = sessions.map(s => {
    let maxW = 0, repsAtMax = 0;
    for (let st = 1; st <= (ex.sets || 6); st++) {
      const d = s[`${exIdx}-${st}`];
      if (d && d.w && !d.warmup) { const w = parseFloat(d.w); if (w >= maxW) { maxW = w; repsAtMax = parseInt(d.r) || 0; } }
    }
    return { w: maxW, r: repsAtMax };
  }).filter(x => x.w > 0);
  if (topWeights.length < 3) return null;
  const weights = topWeights.map(x => x.w);
  const stalled = weights[0] === weights[1] && weights[1] === weights[2];
  const hittingTop = top && topWeights[0].r >= top;
  if (stalled && hittingTop) return { type: 'progress', weight: weights[0], reps: topWeights[0].r };
  if (stalled && !hittingTop && topWeights[0].r > 0) return { type: 'stall_low', weight: weights[0], reps: topWeights[0].r, top };
  return null;
}

async function computeProposals() {
  const proposals = [];
  const active = planForDate(today());

  // 1) Plan age: suggest a full review via the chat after 8 weeks on one plan.
  const versions = store.get('plan:versions') || [];
  const cur = versions[0];
  const effDate = cur ? cur.effective : null;
  if (effDate) {
    const weeks = Math.floor((Date.parse(today()) - Date.parse(effDate)) / (7 * 864e5));
    if (weeks >= 8) proposals.push({ kind: 'review', title: `You've run this plan ${weeks} weeks`, body: 'Long enough that a structured refresh is worth it. Export your plan and take it to the planning chat with your latest data.', action: 'export' });
  }

  // 2) Progression/stall per exercise (cap at the 3 most actionable).
  let progressPicks = [];
  for (const dk of DAY_KEYS) {
    const day = active[dk];
    if (!day || day.cardio || !day.exercises) continue;
    day.exercises.forEach((ex, ei) => {
      const r = analyseExerciseProgress(dk, ex, ei);
      if (r && r.type === 'progress') progressPicks.push({ dk, ex, ei, ...r });
    });
  }
  progressPicks.slice(0, 3).forEach(p => {
    const isLower = ['Quads', 'Hamstrings', 'Glutes', 'Calves'].includes(p.ex.muscle);
    const inc = isLower ? 5 : 2.5;
    proposals.push({
      kind: 'progress', title: `Progress ${p.ex.name}`,
      body: `Top set held at ${p.weight}kg for ${p.reps} reps across 3 sessions, at the top of its range. Add ${inc}kg and reset reps to the bottom of the range.`,
      action: 'note'
    });
  });

  // 3) Recovery flag (today only, no plan change, just guidance)
  const sleepLog = store.get('sleep:log') || {};
  const lastSleep = sleepLog[daysAgo(1)] || sleepLog[today()];
  const rec = store.get('recovery:latest') || {};
  const todayDow = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
  const todayPlan = active[DAY_KEYS[todayDow]];
  if (todayPlan && /Heavy/i.test(todayPlan.name || '')) {
    const sleepMin = lastSleep ? (lastSleep.h || 0) * 60 + (lastSleep.m || 0) : null;
    if (sleepMin != null && sleepMin < 360) {
      proposals.push({ kind: 'recovery', title: 'Low sleep before a heavy day', body: `You logged ${Math.floor(sleepMin / 60)}h${sleepMin % 60}m. Consider keeping today's top sets at RIR 2-3 and skipping any extra sets. Not a plan change, just a readiness flag.`, action: null });
    }
  }

  // 4) ADHERENCE LEARNING: does reality match the plan?
  // 4a) Cardio actual vs suggested over recent cardio sessions.
  for (const dk of ['cardio_1', 'cardio_2']) {
    const day = active[dk];
    if (!day || !day.cardio || !day.duration) continue;
    const keys = store.list(`cardio:${dk}:`).sort().reverse().slice(0, 4);
    const durs = keys.map(k => { const v = store.get(k); return v && typeof v === 'object' ? v.duration : null; }).filter(v => v != null);
    if (durs.length >= 3) {
      const avg = durs.reduce((a, b) => a + b, 0) / durs.length;
      const off = (avg - day.duration) / day.duration;
      if (Math.abs(off) >= 0.2) {
        const dir = off < 0 ? 'less' : 'more';
        proposals.push({
          kind: 'adherence',
          title: `Your ${day.name} runs ${dir} than planned`,
          body: `Plan suggests ${day.duration} min. Your recent average is ${Math.round(avg)} min. If that is the real rhythm, the plan can be set to match it in your next update so the target reflects reality.`,
          action: 'export'
        });
      }
    }
  }

  // 4b) Recurring modifications / freestyle in recent sessions.
  const sessKeys = store.list('session:').sort().reverse().slice(0, 8);
  const recentAdh = sessKeys.map(k => store.get(k)).filter(s => s && s.adherence);
  const modCount = recentAdh.filter(s => s.adherence === 'modified' || s.adherence === 'freestyle').length;
  if (recentAdh.length >= 4 && modCount >= Math.ceil(recentAdh.length * 0.5)) {
    // Tally the most common reasons
    const reasonTally = {};
    recentAdh.forEach(s => (s.deviationReasons || []).forEach(r => { reasonTally[r] = (reasonTally[r] || 0) + 1; }));
    const topReason = Object.entries(reasonTally).sort((a, b) => b[1] - a[1])[0];
    const reasonTxt = topReason ? ` Most common reason: ${topReason[0].toLowerCase()}.` : '';
    proposals.push({
      kind: 'adherence',
      title: 'You are modifying the plan often',
      body: `${modCount} of your last ${recentAdh.length} sessions deviated from the plan.${reasonTxt} That is useful signal. A plan update could bring the plan closer to what actually works for you.`,
      action: 'export'
    });
  }

  return proposals;
}

async function renderProposalsBlock() {
  const proposals = await computeProposals();
  if (!proposals.length) {
    return `<div class="lbl">Coach Suggestions</div>
      <div class="coach-card"><div style="font-size:13px;color:var(--muted2)">Nothing to flag right now. Plan is on track. Suggestions appear here as your logged data builds up.</div></div>`;
  }
  const cards = proposals.map((p, i) => {
    const color = p.kind === 'recovery' ? 'var(--yellow)' : p.kind === 'review' ? 'var(--blue)' : p.kind === 'adherence' ? 'var(--blue)' : 'var(--green)';
    let btn = '';
    if (p.action === 'export') btn = `<button class="btn btn-outline" style="margin-top:10px" onclick="exportPlan()">Export Plan</button>`;
    else if (p.kind === 'progress') btn = `<button class="btn btn-red" style="margin-top:10px" onclick="applyAllProgressions()">Apply progressions</button>`;
    return `<div class="coach-card" style="border-left:3px solid ${color}">
      <div style="font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:0.02em">${esc(p.title)}</div>
      <div style="font-size:13px;color:var(--muted2);line-height:1.6;margin-top:4px">${esc(p.body)}</div>
      ${i === proposals.findIndex(x => x.kind === 'progress') ? btn : (p.action === 'export' ? btn : '')}
    </div>`;
  }).join('');
  return `<div class="lbl">Coach Suggestions</div>${cards}`;
}

// Build a candidate plan applying all detected progressions, then stage it for confirm.
async function applyAllProgressions() {
  const active = planForDate(today());
  const candidate = cloneActivePlan();
  let changes = 0;
  for (const dk of DAY_KEYS) {
    const day = active[dk];
    if (!day || day.cardio || !day.exercises) continue;
    day.exercises.forEach((ex, ei) => {
      const r = analyseExerciseProgress(dk, ex, ei);
      if (r && r.type === 'progress') {
        // Progression here = a note bump on the candidate exercise (load is logged per session,
        // so the plan-level change is a cue: reset to bottom of range at the new load).
        const [bottom] = parseRange(ex.reps);
        const isLower = ['Quads', 'Hamstrings', 'Glutes', 'Calves'].includes(ex.muscle);
        const inc = isLower ? 5 : 2.5;
        const tgt = candidate[dk].exercises[ei];
        tgt.note = `${(tgt.note || '').replace(/ · target.*$/, '')} · target ${r.weight + inc}kg from ${bottom} reps`;
        changes++;
      }
    });
  }
  if (!changes) { toast('No progressions to apply'); return; }
  const plan = { name: `Progression update ${today()}`, rationale: `Coach progression: ${changes} exercise(s) advanced after hitting the top of their rep range. Load targets bumped, reps reset to the bottom of the range.`, days: candidate };
  stagePlan(plan, 'coach', `Coach found ${changes} exercise(s) ready to progress.`);
}

// ---- Derived nutrition targets ----
// Replaces the old hardcoded 2200kcal / 175g / fixed BMR. BMR via Mifflin-St
// Jeor from current weight, height, age. Calorie target scales BMR by an
// activity factor and a goal offset. Protein target is g per kg bodyweight by
// goal. All inputs come from existing profile + recovery data; if something is
// missing it falls back to baseline so targets always render.
function nutritionTargets(profile, rec) {
  const weight = (rec && rec.weight) || BASELINE.weight;     // kg
  const height = (profile && profile.height) || 178;          // cm
  const age = (profile && profile.age) || 37;                 // years
  const goal = (profile && profile.goal) || 'recomp';
  // Mifflin-St Jeor (male). Single-user male app; documented profile is male.
  const bmr = Math.round(10 * weight + 6.25 * height - 5 * age + 5);
  const activity = 1.5; // moderate: lifting 5-6x/week + cardio
  const tdee = bmr * activity;
  const goalOffset = { cut: -0.18, recomp: -0.05, maintain: 0, bulk: 0.10 }[goal] ?? -0.05;
  const calTarget = Math.round((tdee * (1 + goalOffset)) / 10) * 10;
  // Protein g/kg by goal (higher when cutting to protect lean mass).
  const protPerKg = { cut: 2.2, recomp: 2.0, maintain: 1.8, bulk: 1.8 }[goal] ?? 2.0;
  const protTarget = Math.round(weight * protPerKg);
  return { bmr, calTarget, protTarget, goal };
}
function goalLabel(g) {
  return { cut: 'Cut', recomp: 'Recomp', maintain: 'Maintain', bulk: 'Lean bulk' }[g] || 'Recomp';
}

// ---- CSV health-data import (Withings / Apple) ----
function parseCSVLine(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i + 1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if ((c === ',' || c === ';' || c === '\t') && !inQ) { out.push(cur); cur = ''; }
    else cur += c;
  }
  out.push(cur);
  return out.map(s => s.trim());
}

function toISODate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);            // 2026-05-29...
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{2})[\/.](\d{2})[\/.](\d{4})/);         // 29/05/2026 or 05/29/2026 (assume D/M/Y for EU)
  if (m) return `${m[3]}-${m[2]}-${m[1]}`;
  const d = new Date(s);
  if (!isNaN(d)) return d.toISOString().split('T')[0];
  return null;
}

function colMatch(headers, ...needles) {
  return headers.findIndex(h => needles.some(n => h.toLowerCase().includes(n)));
}

// Each parser returns { recByDate, sleepByDate, activityByDate, found:[] }
function emptyExtract() { return { recByDate: {}, sleepByDate: {}, activityByDate: {}, found: [], rows: 0 }; }

function parseHealthCSV(text) {
  const ex = emptyExtract();
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (lines.length < 2) return ex;
  const headers = parseCSVLine(lines[0]);
  const idx = {
    date:   colMatch(headers, 'date', 'day', 'start', 'time'),
    weight: colMatch(headers, 'weight'),
    fatkg:  headers.findIndex(h => /fat\s*mass/i.test(h)),
    fatpct: headers.findIndex(h => /fat.*%|fat ratio|body fat/i.test(h)),
    muscle: colMatch(headers, 'muscle'),
    hrv:    colMatch(headers, 'hrv', 'variability'),
    rhr:    headers.findIndex(h => /resting/i.test(h)),
    sleepH: headers.findIndex(h => /(sleep|duration).*h(ou)?r|hours/i.test(h)),
    sleepMin: headers.findIndex(h => /(sleep|duration).*min/i.test(h)),
    sleepSec: headers.findIndex(h => /duration.*\(s\)|seconds/i.test(h))
  };
  if (idx.date < 0) return ex;
  const num = v => { const n = parseFloat(String(v).replace(',', '.')); return isNaN(n) ? null : n; };

  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const date = toISODate(cols[idx.date]);
    if (!date) continue;
    ex.rows++;
    const r = ex.recByDate[date] || { date };
    if (idx.weight >= 0 && num(cols[idx.weight]) != null) r.weight = num(cols[idx.weight]);
    if (idx.muscle >= 0 && num(cols[idx.muscle]) != null) r.muscle = num(cols[idx.muscle]);
    if (idx.hrv >= 0 && num(cols[idx.hrv]) != null) r.hrv = num(cols[idx.hrv]);
    if (idx.rhr >= 0 && num(cols[idx.rhr]) != null) r.rhr = num(cols[idx.rhr]);
    if (idx.fatpct >= 0 && num(cols[idx.fatpct]) != null) r.bf = num(cols[idx.fatpct]);
    else if (idx.fatkg >= 0 && num(cols[idx.fatkg]) != null && r.weight) r.bf = Math.round((num(cols[idx.fatkg]) / r.weight) * 1000) / 10;
    if (Object.keys(r).length > 1) ex.recByDate[date] = r;

    let h = null, m = null;
    if (idx.sleepSec >= 0 && num(cols[idx.sleepSec]) != null) { const s = num(cols[idx.sleepSec]); h = Math.floor(s / 3600); m = Math.round((s % 3600) / 60); }
    else if (idx.sleepH >= 0 && num(cols[idx.sleepH]) != null) { const hv = num(cols[idx.sleepH]); h = Math.floor(hv); m = Math.round((hv - h) * 60); if (idx.sleepMin >= 0 && num(cols[idx.sleepMin]) != null) m = num(cols[idx.sleepMin]); }
    if (h != null) ex.sleepByDate[date] = { h, m: m || 0 };
  }
  ex.found = Object.entries({ weight: idx.weight, 'body fat': (idx.fatpct >= 0 || idx.fatkg >= 0) ? 1 : -1, muscle: idx.muscle, HRV: idx.hrv, 'resting HR': idx.rhr, sleep: Math.max(idx.sleepH, idx.sleepSec) })
    .filter(([, v]) => v >= 0).map(([k]) => k);
  return ex;
}

// Apple Health export.xml: scan <Record ...> tags. Attributes can be in any order,
// so we grab each tag then read attributes individually (lazy combined regexes are unreliable).
function parseAppleXML(text) {
  const ex = emptyExtract();
  const num = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
  const localDate = s => (s ? s.slice(0, 10) : null);
  const attr = (tag, name) => { const m = tag.match(new RegExp(name + '="([^"]*)"')); return m ? m[1] : null; };
  const parseTs = s => { if (!s) return NaN; return Date.parse(s.replace(' ', 'T').replace(/ ([+-]\d{2})(\d{2})$/, '$1:$2')); };
  const sleepSeg = {};
  const seen = {};

  const re = /<Record\b[^>]*>/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const tag = m[0];
    const type = attr(tag, 'type'); if (!type) continue;
    const start = attr(tag, 'startDate'), end = attr(tag, 'endDate'), valRaw = attr(tag, 'value');
    const date = localDate(start); if (!date) continue;
    const set = (field, v) => { if (v == null) return; const r = ex.recByDate[date] || { date }; r[field] = v; ex.recByDate[date] = r; seen[field] = 1; };
    if (type.endsWith('HeartRateVariabilitySDNN')) set('hrv', num(valRaw));
    else if (type.endsWith('RestingHeartRate')) set('rhr', num(valRaw));
    else if (type.endsWith('IdentifierBodyMass')) set('weight', num(valRaw));
    else if (type.endsWith('BodyFatPercentage')) { let v = num(valRaw); if (v != null && v < 1.5) v = Math.round(v * 1000) / 10; set('bf', v); }
    else if (type.endsWith('LeanBodyMass')) set('muscle', num(valRaw));
    else if (type.endsWith('SleepAnalysis') && valRaw && /Asleep/i.test(valRaw)) {
      const t0 = parseTs(start), t1 = parseTs(end);
      if (!isNaN(t0) && !isNaN(t1) && t1 > t0) {
        const wakeDate = localDate(end);
        sleepSeg[wakeDate] = (sleepSeg[wakeDate] || 0) + (t1 - t0) / 60000;
        seen['sleep'] = 1;
      }
    }
  }
  Object.entries(sleepSeg).forEach(([d, mins]) => {
    const total = Math.round(mins);
    ex.sleepByDate[d] = { h: Math.floor(total / 60), m: total % 60 };
  });
  ex.rows = Object.keys(ex.recByDate).length + Object.keys(ex.sleepByDate).length;
  ex.found = Object.keys(seen).map(k => ({ hrv: 'HRV', rhr: 'resting HR', weight: 'weight', bf: 'body fat', muscle: 'muscle', sleep: 'sleep' }[k] || k));
  return ex;
}

function haversine(a, b) {
  const R = 6371000, toR = x => x * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLon = toR(b.lon - a.lon);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toR(a.lat)) * Math.cos(toR(b.lat)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

// GPX route: derive date, distance, duration, simple activity type.
function parseGPX(text) {
  const ex = emptyExtract();
  const pts = [];
  const re = /lon="([-\d.]+)"\s+lat="([-\d.]+)"[^>]*>(?:<ele>[^<]*<\/ele>)?<time>([^<]+)<\/time>/g;
  let m;
  while ((m = re.exec(text)) !== null) pts.push({ lon: +m[1], lat: +m[2], t: m[3] });
  if (pts.length < 2) return ex;
  let dist = 0;
  for (let i = 1; i < pts.length; i++) dist += haversine(pts[i - 1], pts[i]);
  const t0 = Date.parse(pts[0].t), t1 = Date.parse(pts[pts.length - 1].t);
  const durSec = (t1 - t0) / 1000;
  const date = pts[0].t.slice(0, 10);
  const km = dist / 1000;
  const speed = durSec > 0 ? dist / durSec : 0; // m/s
  const type = speed > 2.2 ? 'Run' : 'Walk';
  ex.activityByDate[date] = { type, distKm: Math.round(km * 100) / 100, durMin: Math.round(durSec / 60), source: 'gpx' };
  ex.rows = 1;
  ex.found = ['outdoor activity'];
  return ex;
}

// Merge one extract into storage (additive, dedupe by date).
async function mergeExtract(ex) {
  let recN = 0, sleepN = 0, actN = 0;
  const recKeys = Object.keys(ex.recByDate);
  if (recKeys.length) {
    const hist = await store.get('recovery:history') || [];
    const map = {};
    hist.forEach(e => { if (e.date) map[e.date] = e; });
    recKeys.forEach(d => { map[d] = { ...(map[d] || {}), ...ex.recByDate[d] }; recN++; });
    const merged = Object.values(map).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    if (merged.length > 730) merged.splice(0, merged.length - 730);
    await store.set('recovery:history', merged);
    const latest = merged[merged.length - 1];
    const cur = await store.get('recovery:latest') || {};
    if (!cur.date || latest.date >= cur.date) await store.set('recovery:latest', { ...cur, ...latest });
  }
  const sleepKeys = Object.keys(ex.sleepByDate);
  if (sleepKeys.length) {
    const log = await store.get('sleep:log') || {};
    sleepKeys.forEach(d => { log[d] = { ...(log[d] || {}), ...ex.sleepByDate[d] }; sleepN++; });
    await store.set('sleep:log', log);
  }
  const actKeys = Object.keys(ex.activityByDate);
  for (const d of actKeys) { await store.set(`activity:${d}`, ex.activityByDate[d]); actN++; }
  return { recN, sleepN, actN };
}

function detectAndParse(name, text) {
  const lower = name.toLowerCase();
  if (lower.endsWith('.gpx') || /<gpx[\s>]/i.test(text.slice(0, 500))) return { kind: 'GPX', ex: parseGPX(text) };
  if (lower.endsWith('.xml') || /<HealthData/i.test(text.slice(0, 2000))) return { kind: 'Apple XML', ex: parseAppleXML(text) };
  return { kind: 'CSV', ex: parseHealthCSV(text) };
}

async function renderCoverage() {
  const area = document.getElementById('coverage-area');
  if (!area) return;
  const hist = await store.get('recovery:history') || [];
  const sleep = await store.get('sleep:log') || {};
  const acts = store.list('activity:');
  const dates = [...hist.map(e => e.date), ...Object.keys(sleep), ...acts.map(k => k.slice(9))].filter(Boolean).sort();
  if (!dates.length) { area.innerHTML = ''; return; }
  const count = f => hist.filter(e => e[f] != null).length;
  area.innerHTML = `<div class="setting-item" style="border-top:1px solid var(--line);margin-top:4px">
    <div class="setting-label">Stored data coverage</div>
    <div class="setting-sub" style="line-height:1.7">
      Range: ${dates[0]} to ${dates[dates.length - 1]}<br>
      Weight ${count('weight')} · Body fat ${count('bf')} · Muscle ${count('muscle')} · HRV ${count('hrv')} · RHR ${count('rhr')} days<br>
      Sleep ${Object.keys(sleep).length} nights · Activities ${acts.length}
    </div>
  </div>`;
}

document.getElementById('importFile').addEventListener('change', async function() {
  const files = Array.from(this.files || []);
  if (!files.length) return;
  const out = document.getElementById('import-result');
  const totals = { recN: 0, sleepN: 0, actN: 0 };
  const lines = [];
  for (const file of files) {
    if (out) out.textContent = `Reading ${file.name}...`;
    try {
      const text = await file.text();
      const { kind, ex } = detectAndParse(file.name, text);
      if (!ex.rows && !ex.found.length) { lines.push(`${file.name}: nothing recognised`); continue; }
      const merged = await mergeExtract(ex);
      totals.recN += merged.recN; totals.sleepN += merged.sleepN; totals.actN += merged.actN;
      lines.push(`${file.name} (${kind}): ${ex.found.join(', ') || 'none'} — +${merged.recN} recovery, +${merged.sleepN} sleep, +${merged.actN} activity`);
    } catch (e) {
      lines.push(`${file.name}: could not read (${e.message})`);
    }
  }
  if (out) out.innerHTML = lines.map(esc).join('<br>');
  toast(`Imported ${totals.recN + totals.sleepN + totals.actN} day-records`);
  await updateReadinessPill();
  await renderCoverage();
  this.value = '';
});

// ============================================================
// NAVIGATION
// ============================================================
async function updateReadinessPill() {
  const sleepLog = await store.get('sleep:log') || {};
  const yestSleep = sleepLog[daysAgo(1)] || sleepLog[today()];
  const rec = await store.get('recovery:latest') || {};
  const energy = yestSleep?.energy || null;
  const conf = readinessConfidence(yestSleep, rec.hrv, rec.rhr);
  const score = Math.max(0, calcReadiness(yestSleep, rec.hrv, rec.rhr, energy) - sorenessPenalty(today()));
  const color = readinessColor(score);
  const dot = document.getElementById('readinessDot');
  const num = document.getElementById('readinessNum');
  if (dot) { dot.style.background = conf.level === 'none' ? 'var(--muted2)' : color; }
  if (num) { num.textContent = conf.level === 'none' ? '--' : score; num.style.color = conf.level === 'none' ? 'var(--muted2)' : color; }
  const pill = document.getElementById('readinessPill');
  if (pill) pill.style.borderColor = `${color.replace('var(','').replace(')','').replace('--','')}`;
}

function editDay(dateStr) {
  viewDate = dateStr;
  currentDay = DAY_KEYS[dowIndex(dateStr)];
  sessionPRs = {};
  switchTab('workout');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  switch (tab) {
    case 'workout':  renderWorkout(); break;
    case 'progress': renderProgress(); break;
    case 'coach':    renderCoach(); break;
    case 'health':   renderHealth(); break;
    case 'settings': renderSettings(); break;
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  viewDate = today();
  healthViewDate = today();
  const dow = new Date().getDay();
  currentDay = DAY_KEYS[dow === 0 ? 6 : dow - 1];

  // Storage status
  showSync('...');

  // Load the ENTIRE dataset into memory in one parallel batch.
  // This is what makes every tab open instantly instead of taking 40-75s.
  await store.loadAll();
  // Merge in cross-device state: localStorage first, then Supabase if newer.
  await cloudLoad();
  showSync('ok');

  // Nav buttons
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  await updateReadinessPill();
  await renderWorkout();

  // Google Drive auto-backup: 2 min after load (captures previous session), then every 30 min.
  setTimeout(driveAutoBackup, 2 * 60 * 1000);
  setInterval(driveAutoBackup, 30 * 60 * 1000);

  // Cross-device live sync: pull newer remote state on focus/visibility (covers
  // Safari's back-forward cache, which restores the page without re-running init)
  // and on a periodic timer. Flush any pending local edit when the tab hides/closes.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) flushCloudSave();
    else cloudPull();
  });
  window.addEventListener('focus', cloudPull);
  window.addEventListener('pageshow', cloudPull);
  window.addEventListener('pagehide', flushCloudSave);
  setInterval(cloudPull, 60 * 1000);
}

init();
</script>
